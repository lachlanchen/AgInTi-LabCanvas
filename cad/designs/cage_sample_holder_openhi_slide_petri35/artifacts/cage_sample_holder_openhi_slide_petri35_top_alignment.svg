<text x="764.00" y="55.00" font-family="Arial" font-size="17" font-weight="700" fill="#1a202c">Elegant modular cage sample holder</text>
<text x="764.00" y="80.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Use as two parts: frame + one cartridge</text>
<text x="764.00" y="105.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Frame: 90.0 x 54.0 mm, middle removed</text>
<text x="764.00" y="130.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Top/bottom cage rods pass through the four blue holes</text>
<text x="764.00" y="155.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Clear rod gap is about 23.6 mm</text>
<text x="764.00" y="180.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">OpenHI strip cartridge: 74.5 x 21.5 mm seat</text>
<text x="764.00" y="205.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Petri cartridge: 35.2 mm loose cup for 33 mm dish</text>
<text x="764.00" y="230.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Dashed red: standard 76 x 26 slide, too wide for cage gap</text>
<text x="764.00" y="255.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Gray holes: M2.5/M2.6 cartridge screws</text>
