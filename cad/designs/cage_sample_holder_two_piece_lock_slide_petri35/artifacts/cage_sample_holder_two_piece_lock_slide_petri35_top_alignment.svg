<text x="803.00" y="54.00" font-family="Arial" font-size="17" font-weight="700" fill="#1a202c">Two-piece locking sample holder</text>
<text x="803.00" y="79.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Outer: 110 x 70 mm; sample zone: 80 x 40 mm</text>
<text x="803.00" y="104.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Bottom: slide sink + 35.4 mm petri sink + four lower rod sockets</text>
<text x="803.00" y="129.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Top: open window + four upper rod sockets + lock holes</text>
<text x="803.00" y="154.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Four lock feet: 5.8 mm; matching holes: 6.2 mm</text>
<text x="803.00" y="179.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Rod sockets: 6.4 mm blind pockets; M3 pilot/thread axis: 2.6 mm</text>
<text x="803.00" y="204.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">Slide and petri seats overlap at the center by design</text>
<text x="803.00" y="229.00" font-family="Arial" font-size="13" font-weight="400" fill="#1a202c">18 mm chamber gap leaves finger room for placing/removing samples</text>
